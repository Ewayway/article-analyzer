<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章分析工具</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --border: #2a2a30;
    --accent: #e8c547;
    --accent2: #5b8af0;
    --text: #e2e2e6;
    --muted: #7a7a85;
    --success: #4caf82;
    --danger: #e05a5a;
    --warn: #e8943a;
    --card: #1c1c21;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', 'Noto Serif SC', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  header .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .subtitle {
    color: var(--muted);
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
  }
  header .pill {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Layout ── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    gap: 24px;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* ── Config section ── */
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media(max-width: 600px) { .config-grid { grid-template-columns: 1fr; } }

  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent2);
  }
  input[type="password"] { letter-spacing: 2px; }
  select option { background: var(--surface); }

  /* ── Input tabs ── */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--surface);
    padding: 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    border-radius: 5px;
    transition: all .2s;
    border: none;
    background: none;
  }
  .tab.active {
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  .input-panel { display: none; }
  .input-panel.active { display: block; }

  /* ── File drop zone ── */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    color: var(--muted);
    font-size: 13px;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent2); color: var(--text); }
  .dropzone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .dropzone .icon { font-size: 28px; margin-bottom: 10px; display: block; }
  .dropzone .file-name {
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  textarea { min-height: 120px; resize: vertical; }

  /* ── Source name inline ── */
  .source-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: end;
    margin-top: 12px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    border: none;
    transition: all .2s;
    letter-spacing: .5px;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    font-size: 11px;
    padding: 5px 10px;
  }
  .btn-accent2 {
    background: var(--accent2);
    color: #fff;
    font-weight: 500;
  }
  .btn-accent2:hover { opacity: .85; }
  .btn-accent2:disabled { opacity: .4; cursor: not-allowed; }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  /* ── Loading ── */
  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    margin-top: 16px;
  }
  .loading.show { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results list ── */
  #results-section { display: none; }
  #results-section.show { display: block; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeIn .3s ease;
    position: relative;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .result-source {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    word-break: break-all;
  }
  .result-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media(max-width: 600px) { .result-grid { grid-template-columns: 1fr; } }

  .result-field {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
  }
  .result-field.full { grid-column: 1 / -1; }
  .field-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field-value { font-size: 13px; color: var(--text); }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }
  .badge-高 { background: rgba(76,175,130,.15); color: var(--success); border: 1px solid var(--success); }
  .badge-中 { background: rgba(232,148,58,.15); color: var(--warn); border: 1px solid var(--warn); }
  .badge-低 { background: rgba(224,90,90,.15); color: var(--danger); border: 1px solid var(--danger); }

  ul.evidence-list { list-style: none; padding: 0; }
  ul.evidence-list li {
    padding: 4px 0;
    padding-left: 14px;
    position: relative;
    font-size: 13px;
    color: var(--text);
  }
  ul.evidence-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 11px;
  }

  /* ── Comparison result ── */
  #comparison-result { display: none; }
  #comparison-result.show { display: block; }

  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  @media(max-width: 600px) { .compare-grid { grid-template-columns: 1fr; } }

  .compare-conclusion {
    background: rgba(91,138,240,.08);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 16px;
    margin-top: 12px;
    grid-column: 1 / -1;
  }
  .compare-conclusion .field-label { color: var(--accent2); }
  .compare-conclusion .field-value { font-size: 14px; line-height: 1.8; }

  /* ── Error ── */
  .error-msg {
    background: rgba(224,90,90,.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ── Count badge ── */
  .count-badge {
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 8px;
  }

  /* ── Divider ── */
  hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

  .tip {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">ArticleLens</div>
    <div class="subtitle">批量文章分析 · 辅助决策判断</div>
  </div>
  <div class="pill" id="model-pill">— 未配置</div>
</header>

<div class="container">

  <!-- ① 配置区 -->
  <div class="card">
    <div class="card-title">API 配置</div>
    <div class="config-grid">
      <div>
        <label>AI 模型</label>
        <select id="provider" onchange="updatePill()">
          {% for key, cfg in api_configs.items() %}
          <option value="{{ key }}">{{ cfg.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="粘贴你的 API Key">
      </div>
    </div>
    <div class="tip">⚠ API Key 仅在本次会话中使用，不会被保存或上传</div>
  </div>

  <!-- ② 输入区 -->
  <div class="card">
    <div class="card-title">输入文章</div>

    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('file', this)">📄 上传文件</button>
      <button class="tab" onclick="switchTab('url', this)">🔗 输入链接</button>
      <button class="tab" onclick="switchTab('text', this)">✏️ 粘贴正文</button>
    </div>

    <!-- 文件上传 -->
    <div class="input-panel active" id="panel-file">
      <div class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt" onchange="onFileSelected(this)">
        <span class="icon">📂</span>
        <div>点击选择文件，或拖拽到此处</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">支持 PDF · Word · TXT</div>
        <div class="file-name" id="file-name"></div>
      </div>
    </div>

    <!-- URL -->
    <div class="input-panel" id="panel-url">
      <label>网页地址</label>
      <input type="url" id="url-input" placeholder="https://example.com/article">
      <div class="tip">微信文章建议使用「粘贴正文」方式</div>
    </div>

    <!-- 粘贴文本 -->
    <div class="input-panel" id="panel-text">
      <div class="source-row">
        <div>
          <label>来源标题（可选）</label>
          <input type="text" id="source-name" placeholder="如：财新 · 2024-04 · AI监管">
        </div>
      </div>
      <div style="margin-top:12px">
        <label>文章正文</label>
        <textarea id="text-input" placeholder="粘贴微信文章或其他文字内容…"></textarea>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="analyzeArticle()" id="analyze-btn">
        ⚡ 分析这篇
      </button>
    </div>

    <div class="loading" id="loading-single">
      <div class="spinner"></div>
      <span>正在分析，请稍候…</span>
    </div>
    <div class="error-msg" id="error-single"></div>
  </div>

  <!-- ③ 分析结果列表 -->
  <div id="results-section">
    <div class="card-title" style="padding: 0 4px; margin-bottom: 16px;">
      分析结果
      <span class="count-badge" id="results-count">0</span>
    </div>

    <div id="results-list"></div>

    <div class="btn-row">
      <button class="btn btn-accent2" onclick="compareAll()" id="compare-btn" disabled>
        🔍 综合对比所有文章
      </button>
      <button class="btn btn-secondary" onclick="exportAll()">
        💾 导出报告
      </button>
      <button class="btn btn-danger" onclick="clearAll()">
        清空全部
      </button>
    </div>

    <div class="loading" id="loading-compare">
      <div class="spinner"></div>
      <span>正在综合对比分析…</span>
    </div>
    <div class="error-msg" id="error-compare"></div>
  </div>

  <!-- ④ 对比结果 -->
  <div id="comparison-result">
    <div class="card">
      <div class="card-title">综合对比分析</div>
      <div class="compare-grid" id="compare-grid"></div>
    </div>
  </div>

</div>

<script>
  // ── 状态 ──
  let articles = [];
  let currentTab = 'file';

  // ── Tab 切换 ──
  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  // ── Model pill ──
  function updatePill() {
    const sel = document.getElementById('provider');
    const name = sel.options[sel.selectedIndex].text;
    document.getElementById('model-pill').textContent = name;
  }
  updatePill();

  // ── File selection ──
  function onFileSelected(input) {
    const name = input.files[0]?.name || '';
    document.getElementById('file-name').textContent = name ? '✓ ' + name : '';
  }

  // Drag & drop
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file) {
      document.getElementById('file-input').files = e.dataTransfer.files;
      onFileSelected(document.getElementById('file-input'));
    }
  });

  // ── 分析单篇 ──
  async function analyzeArticle() {
    const apiKey = document.getElementById('api-key').value.trim();
    const provider = document.getElementById('provider').value;
    if (!apiKey) { showError('error-single', '请先填写 API Key'); return; }

    const btn = document.getElementById('analyze-btn');
    btn.disabled = true;
    showLoading('loading-single', true);
    hideError('error-single');

    const formData = new FormData();
    formData.append('api_key', apiKey);
    formData.append('provider', provider);
    formData.append('input_type', currentTab);

    if (currentTab === 'file') {
      const file = document.getElementById('file-input').files[0];
      if (!file) { showError('error-single', '请选择文件'); btn.disabled = false; showLoading('loading-single', false); return; }
      formData.append('file', file);
    } else if (currentTab === 'url') {
      const url = document.getElementById('url-input').value.trim();
      if (!url) { showError('error-single', '请输入URL'); btn.disabled = false; showLoading('loading-single', false); return; }
      formData.append('url', url);
    } else {
      const text = document.getElementById('text-input').value.trim();
      if (!text) { showError('error-single', '请粘贴文章正文'); btn.disabled = false; showLoading('loading-single', false); return; }
      formData.append('text', text);
      formData.append('source_name', document.getElementById('source-name').value.trim());
    }

    try {
      const resp = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await resp.json();
      if (!resp.ok || !data.success) throw new Error(data.error || '未知错误');
      articles.push(data.result);
      renderResults();
      // 清空输入
      document.getElementById('file-input').value = '';
      document.getElementById('file-name').textContent = '';
      document.getElementById('url-input').value = '';
      document.getElementById('text-input').value = '';
      document.getElementById('source-name').value = '';
    } catch(e) {
      showError('error-single', e.message);
    } finally {
      btn.disabled = false;
      showLoading('loading-single', false);
    }
  }

  // ── 渲染结果列表 ──
  function renderResults() {
    const section = document.getElementById('results-section');
    const list = document.getElementById('results-list');
    const count = document.getElementById('results-count');
    const compareBtn = document.getElementById('compare-btn');

    section.classList.toggle('show', articles.length > 0);
    count.textContent = articles.length;
    compareBtn.disabled = articles.length < 2;

    list.innerHTML = '';
    articles.forEach((a, i) => {
      const credClass = 'badge-' + (a.credibility || '中');
      list.innerHTML += `
        <div class="result-item">
          <div class="result-header">
            <div>
              <div class="result-source">${escHtml(a.source)}</div>
              <div class="result-meta">${a.timestamp} · ${a.provider}</div>
            </div>
            <button class="btn btn-danger" onclick="removeArticle(${i})">删除</button>
          </div>
          <div class="result-grid">
            <div class="result-field full">
              <div class="field-label">核心论点</div>
              <div class="field-value">${escHtml(a.core_claim)}</div>
            </div>
            <div class="result-field">
              <div class="field-label">主要证据</div>
              <ul class="evidence-list">${(a.evidence||[]).map(e=>`<li>${escHtml(e)}</li>`).join('')}</ul>
            </div>
            <div class="result-field">
              <div class="field-label">作者立场</div>
              <div class="field-value">${escHtml(a.author_intent)}</div>
            </div>
            <div class="result-field">
              <div class="field-label">最大漏洞</div>
              <div class="field-value">${escHtml(a.biggest_flaw)}</div>
            </div>
            <div class="result-field">
              <div class="field-label">需要核实</div>
              <div class="field-value">${(a.verify_these||[]).join('；')}</div>
            </div>
            <div class="result-field" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <div>
                <div class="field-label">可信度</div>
                <span class="badge ${credClass}">${a.credibility}</span>
              </div>
              <div style="flex:1">
                <div class="field-label">理由</div>
                <div class="field-value" style="font-size:12px">${escHtml(a.credibility_reason)}</div>
              </div>
            </div>
          </div>
        </div>`;
    });
  }

  function removeArticle(i) {
    articles.splice(i, 1);
    renderResults();
    document.getElementById('comparison-result').classList.remove('show');
  }

  function clearAll() {
    if (!confirm('确认清空所有分析结果？')) return;
    articles = [];
    renderResults();
    document.getElementById('comparison-result').classList.remove('show');
  }

  // ── 综合对比 ──
  async function compareAll() {
    const apiKey = document.getElementById('api-key').value.trim();
    const provider = document.getElementById('provider').value;
    if (!apiKey) { showError('error-compare', '请填写 API Key'); return; }

    const btn = document.getElementById('compare-btn');
    btn.disabled = true;
    showLoading('loading-compare', true);
    hideError('error-compare');

    try {
      const resp = await fetch('/compare', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey, provider, summaries: articles })
      });
      const data = await resp.json();
      if (!resp.ok || !data.success) throw new Error(data.error || '未知错误');
      renderComparison(data.result);
    } catch(e) {
      showError('error-compare', e.message);
    } finally {
      btn.disabled = false;
      showLoading('loading-compare', false);
    }
  }

  function renderComparison(c) {
    const section = document.getElementById('comparison-result');
    const grid = document.getElementById('compare-grid');
    const credClass = 'badge-' + (c.confidence || '中');

    grid.innerHTML = `
      <div class="result-field">
        <div class="field-label">共识观点</div>
        <div class="field-value">${escHtml(c.consensus)}</div>
      </div>
      <div class="result-field">
        <div class="field-label">矛盾之处</div>
        <div class="field-value">${escHtml(c.contradictions)}</div>
      </div>
      <div class="result-field">
        <div class="field-label">最强证据链</div>
        <div class="field-value">${escHtml(c.strongest_evidence)}</div>
      </div>
      <div class="result-field">
        <div class="field-label">信息缺口</div>
        <div class="field-value">${(c.information_gaps||[]).join('；')}</div>
      </div>
      <div class="compare-conclusion">
        <div class="field-label">综合结论</div>
        <div class="field-value">${escHtml(c.conclusion)}</div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
          <span class="badge ${credClass}">${c.confidence}</span>
          <span style="font-size:12px;color:var(--muted)">${escHtml(c.confidence_reason)}</span>
        </div>
      </div>`;

    section.classList.add('show');
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── 导出 ──
  async function exportAll() {
    const comparisonEl = document.getElementById('comparison-result');
    const hasComparison = comparisonEl.classList.contains('show');
    // 重新fetch comparison data if available
    const resp = await fetch('/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ articles, comparison: hasComparison ? window._lastComparison : null })
    });
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'analysis.txt'; a.click();
    URL.revokeObjectURL(url);
  }

  // ── Helpers ──
  function showLoading(id, show) {
    document.getElementById(id).classList.toggle('show', show);
  }
  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = '⚠ ' + msg;
    el.classList.add('show');
  }
  function hideError(id) {
    document.getElementById(id).classList.remove('show');
  }
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // store last comparison for export
  const origRender = renderComparison;
  window.renderComparison = function(c) {
    window._lastComparison = c;
    origRender(c);
  };
</script>
</body>
</html>
